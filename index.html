<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDV Premium - Santanna Burger</title>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- Excel LIB -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

<!-- Sweet Alert para melhor UX -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    min-height: 100vh;
}

.container {
    display: flex;
    height: 100vh;
    overflow: hidden;
}

/* PRODUTOS */
.produtos {
    width: 65%;
    padding: 20px;
    overflow-y: auto;
    background: rgba(15, 23, 42, 0.95);
    backdrop-filter: blur(10px);
}

.categorias {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    position: sticky;
    top: 0;
    background: rgba(15, 23, 42, 0.95);
    padding: 10px 0;
    z-index: 10;
}

.categorias button {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
    padding: 10px 20px;
    color: #fff;
    border-radius: 25px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: bold;
}

.categorias button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.categorias button.active {
    background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 15px;
}

.card {
    background: rgba(30, 41, 59, 0.9);
    backdrop-filter: blur(5px);
    padding: 15px;
    border-radius: 15px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: center;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    background: rgba(30, 41, 59, 1);
}

.card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 10px;
}

.card div {
    margin: 5px 0;
}

.card .nome {
    font-weight: bold;
    font-size: 14px;
}

.card .preco {
    color: #10b981;
    font-weight: bold;
    font-size: 18px;
}

/* CARRINHO */
.carrinho {
    width: 35%;
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    padding: 20px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    box-shadow: -5px 0 20px rgba(0,0,0,0.3);
}

.carrinho h3 {
    margin-bottom: 15px;
    color: #fbbf24;
}

/* ===================== */
/* AUTOCOMPLETE STYLES   */
/* ===================== */
.input-wrapper {
    position: relative;
    margin-bottom: 10px;
}

.input-wrapper input {
    width: 100%;
    margin-bottom: 0;
    padding-right: 36px;
}

.input-wrapper .clear-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #64748b;
    cursor: pointer;
    font-size: 16px;
    padding: 2px 4px;
    border-radius: 4px;
    display: none;
    transition: color 0.2s;
}

.input-wrapper .clear-btn:hover {
    color: #ef4444;
}

.input-wrapper input:not(:placeholder-shown) + .clear-btn {
    display: block;
}

.autocomplete-dropdown {
    position: absolute;
    top: calc(100% + 2px);
    left: 0;
    right: 0;
    background: #1e293b;
    border: 1px solid #667eea;
    border-radius: 10px;
    z-index: 1000;
    max-height: 220px;
    overflow-y: auto;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    display: none;
}

.autocomplete-dropdown.open {
    display: block;
}

.autocomplete-item {
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 1px solid #334155;
    transition: background 0.15s;
}

.autocomplete-item:last-child {
    border-bottom: none;
}

.autocomplete-item:hover,
.autocomplete-item.selected {
    background: #334155;
}

.autocomplete-item .ac-nome {
    font-weight: bold;
    font-size: 14px;
    color: #fbbf24;
}

.autocomplete-item .ac-info {
    font-size: 12px;
    color: #94a3b8;
    margin-top: 2px;
}

.autocomplete-item .ac-info span {
    margin-right: 10px;
}

.no-results {
    padding: 12px 14px;
    color: #64748b;
    font-size: 13px;
    text-align: center;
}

input, textarea {
    padding: 10px;
    margin-bottom: 10px;
    border: 1px solid #334155;
    border-radius: 8px;
    background: #1e293b;
    color: #fff;
    font-size: 14px;
    width: 100%;
}

input:focus, textarea:focus {
    outline: none;
    border-color: #667eea;
}

.carrinho-items {
    flex: 1;
    margin: 15px 0;
    overflow-y: auto;
}

.item {
    background: rgba(51, 65, 85, 0.5);
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
}

.item-info {
    flex: 1;
}

.item-nome {
    font-weight: bold;
    margin-bottom: 5px;
}

.item-preco {
    font-size: 12px;
    color: #10b981;
}

.controls {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 5px 0;
}

.controls button {
    background: #334155;
    border: none;
    color: #fff;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.controls button:hover {
    background: #475569;
    transform: scale(1.05);
}

.qtd {
    font-weight: bold;
    min-width: 30px;
    text-align: center;
}

.item-total {
    font-weight: bold;
    color: #fbbf24;
    min-width: 80px;
    text-align: right;
}

.btn-remover {
    background: #dc2626;
    color: white;
    border: none;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.btn-remover:hover {
    background: #b91c1c;
    transform: scale(1.05);
}

.total {
    font-size: 28px;
    font-weight: bold;
    text-align: center;
    padding: 15px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 10px;
    margin: 15px 0;
}

.btn-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
}

.btn {
    padding: 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s ease;
    color: white;
}

.btn-imprimir {
    background: #10b981;
    grid-column: span 2;
}

.btn-relatorio {
    background: #3b82f6;
}

.btn-excel {
    background: #f59e0b;
}

.btn-cancelar {
    background: #ef4444;
}

.btn:hover {
    transform: translateY(-2px);
    filter: brightness(1.1);
}

/* Área de impressão */
.print-area {
    display: none;
}

@media print {
    body * {
        visibility: hidden;
    }
    .print-area, .print-area * {
        visibility: visible;
    }
    .print-area {
        display: block;
        position: absolute;
        left: 0;
        top: 0;
        width: 80mm;
        padding: 10px;
        font-size: 12px;
        font-family: monospace;
    }
}

/* Scrollbar personalizada */
::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}

::-webkit-scrollbar-track {
    background: #1e293b;
}

::-webkit-scrollbar-thumb {
    background: #475569;
    border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
    background: #64748b;
}

/* ============================== */
/* MOBILE - TAB NAVIGATION        */
/* ============================== */
.mobile-tabs {
    display: none;
}

.mobile-fab {
    display: none;
}

/* ============================== */
/* MOBILE BREAKPOINT              */
/* ============================== */
@media (max-width: 768px) {

    /* Layout principal vira coluna com abas */
    .container {
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
    }

    /* Abas mobile fixas no topo */
    .mobile-tabs {
        display: flex;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        background: rgba(15, 23, 42, 0.98);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid #334155;
        height: 52px;
    }

    .mobile-tab {
        flex: 1;
        border: none;
        background: none;
        color: #64748b;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        transition: all 0.2s;
        border-bottom: 3px solid transparent;
        padding-bottom: 3px;
    }

    .mobile-tab.active {
        color: #fbbf24;
        border-bottom-color: #fbbf24;
    }

    .mobile-tab .tab-badge {
        background: #ef4444;
        color: #fff;
        font-size: 10px;
        border-radius: 999px;
        padding: 1px 6px;
        min-width: 18px;
        text-align: center;
        line-height: 16px;
    }

    /* Painéis */
    .produtos, .carrinho {
        width: 100%;
        position: fixed;
        top: 52px;
        left: 0;
        right: 0;
        bottom: 0;
        overflow-y: auto;
        transition: opacity 0.2s, transform 0.2s;
        padding: 12px;
    }

    .produtos {
        background: rgba(15, 23, 42, 0.98);
        padding-top: 8px;
    }

    .carrinho {
        background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    }

    /* Painel escondido */
    .panel-hidden {
        opacity: 0;
        pointer-events: none;
        transform: translateX(20px);
    }

    /* Categorias menores no mobile */
    .categorias {
        gap: 8px;
        padding: 8px 0;
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
    }

    .categorias::-webkit-scrollbar {
        display: none;
    }

    .categorias button {
        padding: 8px 16px;
        font-size: 13px;
        white-space: nowrap;
        flex-shrink: 0;
    }

    /* Grid mobile - 2 colunas compactas */
    .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
    }

    .card {
        padding: 10px;
        border-radius: 12px;
    }

    .card img {
        height: 90px;
        margin-bottom: 8px;
    }

    .card .nome {
        font-size: 13px;
    }

    .card .preco {
        font-size: 15px;
    }

    /* Carrinho mobile */
    .carrinho h3 {
        font-size: 16px;
        margin-bottom: 10px;
    }

    .total {
        font-size: 22px;
        padding: 12px;
        margin: 10px 0;
    }

    .btn-group {
        gap: 8px;
    }

    .btn {
        padding: 11px 8px;
        font-size: 13px;
    }

    /* Item do carrinho mais compacto */
    .item {
        padding: 8px;
        gap: 4px;
    }

    .item-nome {
        font-size: 13px;
    }

    .item-total {
        font-size: 13px;
        min-width: 70px;
    }

    .controls button {
        width: 30px;
        height: 30px;
        font-size: 16px;
    }

    /* Autocomplete dropdown menor no mobile */
    .autocomplete-dropdown {
        max-height: 180px;
    }
}
</style>
</head>

<body>

<!-- ABAS MOBILE (só visíveis no celular) -->
<div class="mobile-tabs" id="mobileTabs">
    <button class="mobile-tab active" id="tabProdutos" onclick="switchTab('produtos')">
        🍔 Produtos
    </button>
    <button class="mobile-tab" id="tabCarrinho" onclick="switchTab('carrinho')">

    </button>
</div>

<div class="container">
    <div class="produtos" id="painelProdutos">
        <div class="categorias" id="cats"></div>
        <div class="grid" id="grid"></div>
    </div>

    <div class="carrinho" id="painelCarrinho">
        <h3>🛒 Finalizar Pedido</h3>

        <!-- Campo Nome com Autocomplete -->
        <div class="input-wrapper">
            <input type="text" id="nome" placeholder="👤 Nome do Cliente *"
                   autocomplete="off"
                   oninput="onNomeInput()"
                   onkeydown="onNomeKeydown(event)"

        <div class="input-wrapper">

        <div class="input-wrapper">
            <input type="tel" id="telefone" placeholder="📱 Telefone">
            <button class="clear-btn" onclick="limparCampo('telefone')" title="Limpar">✕</button>

</div>

<div class="print-area" id="printArea"></div>

<script>
// =========================
// 🔧 CONFIGURAÇÕES
// =========================
const CONFIG = {
    nomeLoja: "SANTANNA BURGER",
    enderecoLoja: "Rua Exemplo, 123 - Centro",
    telefoneLoja: "(11) 99999-9999",

    categorias: ["Página 1", "Página 2", "Página 3", "Bebidas"],

    produtos: [
        


        {nome: "CLASSICO", preco: 22.00, categoria: "Página 1", img: "https://i.imgur.com/pi5Unrc.png"},
        {nome: "BACON", preco: 27.00, categoria: "Página 1", img: "https://i.imgur.com/5MGTFnq.png"},
        {nome: "SALAD", preco: 25.00, categoria: "Página 1", img: "https://i.imgur.com/9OHwMSq.png"},
        {nome: "CHEDDAR BACON", preco: 28.00, categoria: "Página 1", img: "https://i.imgur.com/LfoVPYL.png"},
        {nome: "TRIPLO", preco: 32.00, categoria: "Página 1", img: "https://i.imgur.com/Gk15jNs.png"},
        {nome: "PRIME", preco: 37.00, categoria: "Página 1", img: "https://i.imgur.com/HTx2soK.png"},
        {nome: "Batata Cheddar Bacon", preco: 20.90, categoria: "Página 3", img: "https://i.imgur.com/nY2kUyL.jpeg"},
        {nome: "Coca-Cola", preco: 7.00, categoria: "Bebidas", img: "https://i.imgur.com/NKIBdoC.png"},
        {nome: "GUARANA", preco: 7.00, categoria: "Bebidas", img: "https://i.imgur.com/f6fK3oK.png"}


        
    ]
};

// =========================
// 🔥 FIREBASE CONFIG
// =========================
const firebaseConfig = {
    apiKey: "AIzaSyDH2yHOWoDjgZfYcfGvpbDKROSLril_SMc",
    authDomain: "pedidostheurban.firebaseapp.com",
    projectId: "pedidostheurban",
    storageBucket: "pedidostheurban.firebasestorage.app",
    messagingSenderId: "972986071281",
    appId: "1:972986071281:web:55677ee2b2e1676d999150"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// =========================
// VARIÁVEIS GLOBAIS
// =========================
let carrinho = {};
let categoriaAtual = CONFIG.categorias[0];
let produtosGlobal = JSON.parse(JSON.stringify(CONFIG.produtos));
let clientesHistorico = []; // cache de clientes dos pedidos anteriores
let autocompleteIndex = -1;
let isMobile = () => window.innerWidth <= 768;
let abaAtual = 'produtos';

// =========================
// MOBILE TABS
// =========================
function switchTab(aba) {
    abaAtual = aba;
    const painelProdutos = document.getElementById('painelProdutos');
    const painelCarrinho = document.getElementById('painelCarrinho');
    const tabProdutos = document.getElementById('tabProdutos');
    const tabCarrinho = document.getElementById('tabCarrinho');

    if (aba === 'produtos') {
        painelProdutos.classList.remove('panel-hidden');
        painelCarrinho.classList.add('panel-hidden');
        tabProdutos.classList.add('active');
        tabCarrinho.classList.remove('active');
    } else {
        painelCarrinho.classList.remove('panel-hidden');
        painelProdutos.classList.add('panel-hidden');
        tabCarrinho.classList.add('active');
        tabProdutos.classList.remove('active');
    }
}

function atualizarBadge() {
    if (!isMobile()) return;
    const badge = document.getElementById('cartBadge');
    const qtdTotal = Object.values(carrinho).reduce((s, i) => s + i.qtd, 0);
    if (qtdTotal > 0) {
        badge.textContent = qtdTotal;
        badge.style.display = 'inline-block';
    } else {
        badge.style.display = 'none';
    }
}

// =========================
// FUNÇÕES DE UTILIDADE
// =========================
function showAlert(tipo, mensagem) {
    Swal.fire({
        icon: tipo,
        title: tipo === 'success' ? 'Sucesso!' : tipo === 'error' ? 'Erro!' : 'Aviso',
        text: mensagem,
        timer: 2000,
        showConfirmButton: false
    });
}

function formatarMoeda(valor) {
    return new Intl.NumberFormat('pt-BR', {
        style: 'currency',
        currency: 'BRL'
    }).format(valor);
}

function limparCampo(id) {
    document.getElementById(id).value = '';
    if (id === 'nome') fecharDropdown();
}

// =========================
// AUTOCOMPLETE DE CLIENTES
// =========================

// Carrega todos os clientes do Firebase ao iniciar
async function carregarClientesHistorico() {
    try {
        const snapshot = await db.collection("pedidos").get();
        const clientesMap = new Map();

        snapshot.forEach(doc => {
            const p = doc.data();
            if (!p.cliente) return;
            const nome = p.cliente.trim();
            const key = nome.toLowerCase();

            // Mantém os dados mais recentes de cada cliente
            if (!clientesMap.has(key)) {
                clientesMap.set(key, {
                    nome: nome,
                    endereco: p.endereco || '',
                    telefone: p.telefone || '',
                    dataPedido: p.data ? p.data.toDate() : new Date(0)
                });
            } else {
                const existente = clientesMap.get(key);
                const dataAtual = p.data ? p.data.toDate() : new Date(0);
                if (dataAtual > existente.dataPedido) {
                    clientesMap.set(key, {
                        nome: nome,
                        endereco: p.endereco || existente.endereco,
                        telefone: p.telefone || existente.telefone,
                        dataPedido: dataAtual
                    });
                }
            }
        });

        clientesHistorico = Array.from(clientesMap.values());
        console.log(`✅ ${clientesHistorico.length} clientes carregados do histórico`);
    } catch (e) {
        console.warn('Não foi possível carregar histórico de clientes:', e);
    }
}

function buscarClientes(query) {
    if (!query || query.trim().length < 1) return [];
    const q = query.toLowerCase().trim();
    return clientesHistorico
        .filter(c => c.nome.toLowerCase().includes(q))
        .slice(0, 8);
}

function onNomeInput() {
    const query = document.getElementById('nome').value;
    const resultados = buscarClientes(query);
    autocompleteIndex = -1;

    const dropdown = document.getElementById('nomeDropdown');

    if (resultados.length === 0 || query.trim() === '') {
        fecharDropdown();
        return;
    }

    dropdown.innerHTML = '';
    resultados.forEach((cliente, idx) => {
        const item = document.createElement('div');
        item.className = 'autocomplete-item';
        item.dataset.idx = idx;

        const endInfo = cliente.endereco && cliente.endereco !== 'Não informado'
            ? `📍 ${cliente.endereco}` : '';
        const telInfo = cliente.telefone && cliente.telefone !== 'Não informado'
            ? `📱 ${cliente.telefone}` : '';

        item.innerHTML = `
            <div class="ac-nome">${destacarTexto(cliente.nome, query)}</div>
            <div class="ac-info">
                ${endInfo ? `<span>${endInfo}</span>` : ''}
                ${telInfo ? `<span>${telInfo}</span>` : ''}
                ${!endInfo && !telInfo ? '<span style="color:#475569">Sem dados de contato</span>' : ''}
            </div>
        `;

        item.addEventListener('mousedown', (e) => {
            e.preventDefault(); // Evita blur antes do clique
            selecionarCliente(cliente);
        });

        dropdown.appendChild(item);
    });

    dropdown.classList.add('open');
}

function onNomeKeydown(e) {
    const dropdown = document.getElementById('nomeDropdown');
    const items = dropdown.querySelectorAll('.autocomplete-item');

    if (!dropdown.classList.contains('open') || items.length === 0) return;

    if (e.key === 'ArrowDown') {
        e.preventDefault();
        autocompleteIndex = Math.min(autocompleteIndex + 1, items.length - 1);
        atualizarSelecaoVisual(items);
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        autocompleteIndex = Math.max(autocompleteIndex - 1, -1);
        atualizarSelecaoVisual(items);
    } else if (e.key === 'Enter' && autocompleteIndex >= 0) {
        e.preventDefault();
        const clienteIdx = parseInt(items[autocompleteIndex].dataset.idx);
        const resultados = buscarClientes(document.getElementById('nome').value);
        if (resultados[clienteIdx]) selecionarCliente(resultados[clienteIdx]);
    } else if (e.key === 'Escape') {
        fecharDropdown();
    }
}

function atualizarSelecaoVisual(items) {
    items.forEach((item, i) => {
        item.classList.toggle('selected', i === autocompleteIndex);
    });
}

function selecionarCliente(cliente) {
    document.getElementById('nome').value = cliente.nome;
    if (cliente.endereco && cliente.endereco !== 'Não informado') {
        document.getElementById('endereco').value = cliente.endereco;
    }
    if (cliente.telefone && cliente.telefone !== 'Não informado') {
        document.getElementById('telefone').value = cliente.telefone;
    }
    fecharDropdown();
}

function fecharDropdown() {
    const dropdown = document.getElementById('nomeDropdown');
    dropdown.classList.remove('open');
    autocompleteIndex = -1;
}

// Fecha dropdown ao clicar fora
document.addEventListener('click', (e) => {
    if (!e.target.closest('.input-wrapper')) {
        fecharDropdown();
    }
});

function destacarTexto(texto, query) {
    const idx = texto.toLowerCase().indexOf(query.toLowerCase());
    if (idx === -1) return texto;
    return texto.substring(0, idx) +
        `<strong style="color:#fff">${texto.substring(idx, idx + query.length)}</strong>` +
        texto.substring(idx + query.length);
}

// =========================
// CATEGORIAS
// =========================
function renderCategorias() {
    const el = document.getElementById("cats");
    el.innerHTML = "";
    CONFIG.categorias.forEach(cat => {
        const btn = document.createElement("button");
        btn.textContent = cat;
        btn.onclick = () => trocarCat(cat);
        if (categoriaAtual === cat) btn.classList.add("active");
        el.appendChild(btn);
    });
}

function trocarCat(cat) {
    categoriaAtual = cat;
    renderCategorias();
    renderProdutos();
}

// =========================
// PRODUTOS
// =========================
function renderProdutos() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    const produtosCat = produtosGlobal.filter(p => p.categoria === categoriaAtual);

    if (produtosCat.length === 0) {
        grid.innerHTML = '<div style="text-align:center;padding:50px;">Nenhum produto nesta categoria</div>';
        return;
    }

    produtosCat.forEach(produto => {
        const card = document.createElement("div");
        card.className = "card";
        card.onclick = () => addItem(produto.nome);

        card.innerHTML = `
            <img src="${produto.img}" alt="${produto.nome}">
            <div class="nome">${produto.nome}</div>
            <div class="preco">${formatarMoeda(produto.preco)}</div>
        `;

        grid.appendChild(card);
    });
}

// =========================
// CARRINHO
// =========================
function addItem(nomeProduto) {
    const produto = produtosGlobal.find(p => p.nome === nomeProduto);

    if (!produto) {
        showAlert('error', 'Produto não encontrado!');
        return;
    }

    if (!carrinho[nomeProduto]) {
        carrinho[nomeProduto] = {
            qtd: 0,
            preco: produto.preco,
            nome: nomeProduto
        };
    }

    carrinho[nomeProduto].qtd++;

    atualizarCarrinho();
}

function mais(itemNome) {
    if (carrinho[itemNome]) {
        carrinho[itemNome].qtd++;
        atualizarCarrinho();
    }
}

function menos(itemNome) {
    if (carrinho[itemNome] && carrinho[itemNome].qtd > 0) {
        carrinho[itemNome].qtd--;
        if (carrinho[itemNome].qtd === 0) delete carrinho[itemNome];
        atualizarCarrinho();
    }
}

function removerItem(itemNome) {
    if (carrinho[itemNome]) {
        delete carrinho[itemNome];
        atualizarCarrinho();
        showAlert('success', 'Item removido do carrinho!');
    }
}

function atualizarCarrinho() {
    const lista = document.getElementById("lista");
    lista.innerHTML = "";
    let total = 0;

    for (let item in carrinho) {
        const d = carrinho[item];
        const subtotal = d.qtd * d.preco;
        total += subtotal;

        const itemDiv = document.createElement("div");
        itemDiv.className = "item";
        itemDiv.innerHTML = `
            <div class="item-info">
                <div class="item-nome">${d.nome}</div>
                <div class="item-preco">${formatarMoeda(d.preco)}</div>
            </div>
            <div class="controls">
                <button onclick="menos('${item}')">-</button>
                <span class="qtd">${d.qtd}</span>
                <button onclick="mais('${item}')">+</button>
                <button class="btn-remover" onclick="removerItem('${item}')">🗑️</button>
            </div>
            <div class="item-total">${formatarMoeda(subtotal)}</div>
        `;

        lista.appendChild(itemDiv);
    }

    if (Object.keys(carrinho).length === 0) {
        lista.innerHTML = '<div style="text-align:center;padding:20px;color:#94a3b8;">Carrinho vazio</div>';
    }

    document.getElementById("total").innerHTML = `TOTAL: ${formatarMoeda(total)}`;
    atualizarBadge();
}

function cancelarPedido() {
    if (Object.keys(carrinho).length === 0) {
        showAlert('warning', 'Carrinho já está vazio!');
        return;
    }

    Swal.fire({
        title: 'Cancelar pedido?',
        text: 'Todos os itens serão removidos do carrinho!',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Sim, cancelar',
        cancelButtonText: 'Não'
    }).then((result) => {
        if (result.isConfirmed) {
            carrinho = {};
            atualizarCarrinho();
            document.getElementById("nome").value = "";
            document.getElementById("endereco").value = "";
            document.getElementById("telefone").value = "";
            showAlert('success', 'Pedido cancelado com sucesso!');
        }
    });
}

// =========================
// PEDIDOS
// =========================
async function salvarPedido(dados) {
    try {
        const itensFormatados = {};
        for (let item in carrinho) {
            itensFormatados[item] = {
                nome: carrinho[item].nome,
                qtd: carrinho[item].qtd,
                preco: carrinho[item].preco
            };
        }

        const pedidoData = {
            cliente: dados.cliente,
            endereco: dados.endereco,
            telefone: dados.telefone,
            itens: itensFormatados,
            total: dados.total,
            data: firebase.firestore.Timestamp.now(),
            numeroPedido: Date.now(),
            quantidadeItens: Object.keys(itensFormatados).length
        };

        const docRef = await db.collection("pedidos").add(pedidoData);
        console.log("Pedido salvo com ID:", docRef.id);

        // Atualiza o cache local de clientes
        const key = dados.cliente.toLowerCase();
        const idx = clientesHistorico.findIndex(c => c.nome.toLowerCase() === key);
        const novoCliente = {
            nome: dados.cliente,
            endereco: dados.endereco !== 'Não informado' ? dados.endereco : '',
            telefone: dados.telefone !== 'Não informado' ? dados.telefone : '',
            dataPedido: new Date()
        };
        if (idx >= 0) clientesHistorico[idx] = novoCliente;
        else clientesHistorico.unshift(novoCliente);

        return true;
    } catch (error) {
        console.error("Erro ao salvar:", error);
        return false;
    }
}

async function finalizarPedido() {
    const nome = document.getElementById("nome").value.trim();
    const endereco = document.getElementById("endereco").value.trim();
    const telefone = document.getElementById("telefone").value.trim();

    if (!nome) {
        showAlert('warning', 'Por favor, informe o nome do cliente!');
        return;
    }

    if (Object.keys(carrinho).length === 0) {
        showAlert('warning', 'Carrinho vazio! Adicione produtos primeiro.');
        return;
    }

    Swal.fire({
        title: 'Confirmar pedido?',
        text: 'Deseja finalizar este pedido?',
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'Sim, finalizar',
        cancelButtonText: 'Não'
    }).then(async (result) => {
        if (result.isConfirmed) {
            let total = 0;
            let itensTexto = "";

            for (let item in carrinho) {
                const d = carrinho[item];
                const subtotal = d.qtd * d.preco;
                total += subtotal;
                itensTexto += `${d.qtd}x ${d.nome} - ${formatarMoeda(subtotal)}\n`;
            }

            const pedidoData = {
                cliente: nome,
                endereco: endereco || "Não informado",
                telefone: telefone || "Não informado",
                total: total
            };

            const salvou = await salvarPedido(pedidoData);

            if (salvou) {
                gerarComprovante(nome, endereco, telefone, total, itensTexto);
                window.print();

                carrinho = {};
                atualizarCarrinho();

                setTimeout(() => {
                    document.getElementById("nome").value = "";
                    document.getElementById("endereco").value = "";
                    document.getElementById("telefone").value = "";
                }, 500);

                showAlert('success', 'Pedido finalizado com sucesso!');
            } else {
                showAlert('error', 'Erro ao salvar pedido!');
            }
        }
    });
}

function gerarComprovante(nome, endereco, telefone, total, itensTexto) {
    const printArea = document.getElementById("printArea");
    const dataAtual = new Date().toLocaleString();

    printArea.innerHTML = `
        <div style="font-family: monospace; padding: 10px;">
            <center>
                <h3>${CONFIG.nomeLoja}</h3>
                <small>${CONFIG.enderecoLoja}</small><br>
                <small>Tel: ${CONFIG.telefoneLoja}</small>
                <hr>
                <small>${dataAtual}</small>
                <hr>
            </center>
            <div>
                <strong>Cliente:</strong> ${nome}<br>
                <strong>Endereço:</strong> ${endereco}<br>
                <strong>Telefone:</strong> ${telefone}<br>
            </div>
            <hr>
            <strong>ITENS:</strong><br>
            ${itensTexto.replace(/\n/g, '<br>')}
            <hr>
            <div style="text-align: right;">
                <strong>TOTAL: ${formatarMoeda(total)}</strong>
            </div>
            <hr>
            <center>
                <small>Pedido gerado em ${dataAtual}</small><br>
                <small>Obrigado pela preferência!</small>
            </center>
        </div>
    `;
}

// =========================
// RELATÓRIOS
// =========================
async function relatorio() {
    try {
        const snapshot = await db.collection("pedidos").get();

        if (snapshot.empty) {
            showAlert('info', 'Nenhum pedido encontrado!');
            return;
        }

        let totalDia = 0, totalMes = 0, pedDia = 0, pedMes = 0;
        const hoje = new Date();
        const inicioDia = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate());
        const inicioMes = new Date(hoje.getFullYear(), hoje.getMonth(), 1);

        snapshot.forEach(doc => {
            const p = doc.data();
            const dataPedido = p.data.toDate();
            if (dataPedido >= inicioDia) { totalDia += p.total; pedDia++; }
            if (dataPedido >= inicioMes) { totalMes += p.total; pedMes++; }
        });

        Swal.fire({
            title: '📊 RELATÓRIO DE VENDAS',
            html: `
                <div style="text-align: left;">
                    <h4>📅 Hoje</h4>
                    <p>Total: <strong>${formatarMoeda(totalDia)}</strong><br>Pedidos: ${pedDia}</p>
                    <h4>📆 Mês Atual</h4>
                    <p>Total: <strong>${formatarMoeda(totalMes)}</strong><br>Pedidos: ${pedMes}</p>
                </div>
            `,
            icon: 'info',
            confirmButtonText: 'Fechar'
        });
    } catch (error) {
        console.error("Erro ao gerar relatório:", error);
        showAlert('error', 'Erro ao carregar relatório!');
    }
}

// =========================
// EXPORTAR EXCEL
// =========================
async function exportarExcel() {
    try {
        const snapshot = await db.collection("pedidos").get();

        if (snapshot.empty) {
            showAlert('info', 'Nenhum pedido encontrado!');
            return;
        }

        const dados = [];

        snapshot.forEach(doc => {
            const p = doc.data();
            const itens = p.itens || {};
            const numeroPedido = doc.id;
            const dataPedido = p.data.toDate().toLocaleString('pt-BR');
            const itensArray = Object.values(itens);

            if (itensArray.length === 0) {
                dados.push({
                    'Número': numeroPedido, 'Cliente': p.cliente,
                    'Telefone': p.telefone, 'Endereço': p.endereco,
                    'Total do Pedido': p.total, 'Data': dataPedido,
                    'Quantidade': 0, 'Descrição': 'Sem itens',
                    'Preço Unitário': '', 'Subtotal': ''
                });
            } else {
                itensArray.forEach(item => {
                    dados.push({
                        'Número': numeroPedido, 'Cliente': p.cliente,
                        'Telefone': p.telefone, 'Endereço': p.endereco,
                        'Total do Pedido': p.total, 'Data': dataPedido,
                        'Quantidade': item.qtd, 'Descrição': item.nome,
                        'Preço Unitário': item.preco, 'Subtotal': item.qtd * item.preco
                    });
                });
            }
        });

        dados.sort((a, b) => a['Número'] > b['Número'] ? 1 : -1);

        const ws = XLSX.utils.json_to_sheet(dados);
        ws['!cols'] = [
            {wch:25},{wch:25},{wch:15},{wch:35},
            {wch:15},{wch:22},{wch:10},{wch:30},{wch:15},{wch:15}
        ];

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Vendas_Detalhado");

        const resumoPedidos = [];
        const pedidosMap = new Map();
        snapshot.forEach(doc => {
            const p = doc.data();
            if (!pedidosMap.has(doc.id)) {
                pedidosMap.set(doc.id, {
                    'Número': doc.id, 'Cliente': p.cliente,
                    'Telefone': p.telefone, 'Endereço': p.endereco,
                    'Total': formatarMoeda(p.total),
                    'Data': p.data.toDate().toLocaleString('pt-BR'),
                    'Quantidade Itens': Object.keys(p.itens || {}).length
                });
            }
        });
        pedidosMap.forEach(p => resumoPedidos.push(p));

        const wsResumo = XLSX.utils.json_to_sheet(resumoPedidos);
        wsResumo['!cols'] = [{wch:25},{wch:25},{wch:15},{wch:35},{wch:15},{wch:22},{wch:18}];
        XLSX.utils.book_append_sheet(wb, wsResumo, "Resumo_Pedidos");

        const dataAtual = new Date().toISOString().slice(0,19).replace(/:/g,'-');
        XLSX.writeFile(wb, `relatorio_vendas_detalhado_${dataAtual}.xlsx`);

        const totalVendas = dados.reduce((s,d) => s + (d['Subtotal'] || 0), 0);
        Swal.fire({
            title: '✅ Exportação Concluída!',
            html: `
                <div style="text-align: left;">
                    <p><strong>📊 Estatísticas:</strong></p>
                    <p>📋 Total de Pedidos: ${pedidosMap.size}</p>
                    <p>📦 Total de Itens: ${dados.filter(d=>d['Descrição']!=='Sem itens').length}</p>
                    <p>💰 Valor Total: ${formatarMoeda(totalVendas)}</p>
                </div>
            `,
            icon: 'success',
            confirmButtonText: 'OK'
        });
    } catch (error) {
        console.error("Erro ao exportar:", error);
        showAlert('error', 'Erro ao exportar relatório!');
    }
}
